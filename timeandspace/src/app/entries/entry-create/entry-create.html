<mat-card>
  <form (submit)="onAddEntry(entryForm)" #entryForm="ngForm">
     <!-- ngForm gives access to form object that Angular creates -->
    <mat-form-field>
      <input 
      matInput 
      type="text" 
      name="title"
      ngModel
      required
      minlength="3"
      placeholder="Entry Title"
      #title="ngModel">
      <mat-error *ngIf="title.invalid">Please enter a entry title</mat-error>
    </mat-form-field>

    <mat-form-field>
      <textarea 
      matInput 
      rows="4" 
      name="content"
      ngModel
      required=""
      placeholder="Entry Content"
      #content="ngModel"></textarea>
      <mat-error *ngIf="content.invalid">Please enter content for this entry</mat-error>
    </mat-form-field>

    <button 
    mat-raised-button 
    color="accent" 
    type="submit">Save Post</button>
  </form>
</mat-card>
